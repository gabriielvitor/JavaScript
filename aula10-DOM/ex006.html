<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>

    <style>
        div#area {
            background-color: lightgreen;
            height: 200px;
            width: 200px;

            font: normal 20pt Arial;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>

    <script>
        
        var a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar() {
            a.innerText = 'Clicou!'
            a.style.background = 'red'
            a.style.color = 'white'
        }

        function entrar() {
            a.innerText = 'Entrou!'
            a.style.background = 'lightgreen'
            a.style.color = 'black'
        }

        function sair() {
            a.innerText = 'Saiu!'
            a.style.background = 'darkblue'
            a.style.color = 'white'
        }
        
    </script>
</body>
</html>
