<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Script</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(0, 0, 0);
            color: rgb(159, 151, 151);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.5em;
            
        }

        h1 {
            color: blueviolet;
            text-align: center;
        }

        p {
            text-align: center;
        }
    </style>
</head>
<body>
    <main>    
        <h1>Olá, Mundo!</h1>
        <p>Já me livrei da maldição</p>
    </main>
    <script>
        var nome = window.prompt('Qual é seu nome?') //Pergunta o nome
        window.alert('É um grande prazer em te conhecer, ' + nome) //Alerta a variavel nome, concatenaçã
    </script>
</body>
</html>
